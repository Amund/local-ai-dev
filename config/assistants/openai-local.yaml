name: OpenAI local
version: 1.0.0
schema: v1

models:
  - name: GPT OSS Nano 20B
    provider: openai
    model: unsloth/gpt-oss-20b-GGUF
    apiBase: http://127.0.0.1:9090/v1
    roles:
      - chat
      - edit
      - apply
      - autocomplete
    capabilities:
      - tool_use

context:
  - provider: code
  - provider: docs
  - provider: diff
  - provider: terminal
  - provider: problems
  - provider: folder
  - provider: codebase
